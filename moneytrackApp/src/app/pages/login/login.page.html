<ion-content class="login-content">

  <div class="login-container">

    <div class="logo">

      <ion-icon name="wallet-outline"></ion-icon>

      <h1>MoneyTrack</h1>

      <p>Control de Gastos Personales</p>

    </div>

    <ion-card>

      <ion-card-content>

        <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()">

          <ion-item>
            <ion-icon
                name="mail-outline"
                slot="start">
            </ion-icon>

            <ion-label position="stacked">
              Correo electrónico
            </ion-label>

            <ion-input
              formControlName="correo"
              type="email"
              placeholder="correo@ejemplo.com">
            </ion-input>

          </ion-item>

          <ion-item>

            <ion-icon
                name="lock-closed-outline"
                slot="start">
            </ion-icon>

            <ion-label position="stacked">
              Contraseña
            </ion-label>

            <ion-input
              formControlName="password"
              [type]="mostrarPassword ? 'text' : 'password'"
              placeholder="********">
            </ion-input>

          </ion-item>

          <ion-button
            expand="block"
            class="login-button"
            type="submit"
            color="dark">

            Iniciar Sesión

          </ion-button>

        </form>

        <div class="register">

          ¿No tienes una cuenta?

          <br>

          <a routerLink="/register">
            Crear cuenta
          </a>

        </div>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>

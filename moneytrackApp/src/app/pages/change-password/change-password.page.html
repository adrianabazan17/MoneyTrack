<ion-header>

  <ion-toolbar class="toolbar">

    <ion-buttons slot="start">

      <ion-button
        color="light"
        (click)="volver()">

        <ion-icon
          name="arrow-back-outline">
        </ion-icon>

      </ion-button>

    </ion-buttons>

    <ion-title>

      Cambiar contraseña

    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content class="contenido">

  <div class="contenedor">

    <ion-card>

      <ion-card-content>

        <h2>

          Seguridad

        </h2>

        <p class="subtitulo">

          Actualiza tu contraseña para mantener tu cuenta protegida.

        </p>

        <ion-item>

          <ion-label position="stacked">

            Contraseña actual

          </ion-label>

          <ion-input

            [(ngModel)]="datos.passwordActual"

            [type]="mostrarActual ? 'text' : 'password'">

          </ion-input>

          <ion-button

            fill="clear"

            slot="end"

            (click)="mostrarActual = !mostrarActual">

            <ion-icon

              [name]="mostrarActual ? 'eye-off-outline' : 'eye-outline'">

            </ion-icon>

          </ion-button>

        </ion-item>

        <ion-item>

          <ion-label position="stacked">

            Nueva contraseña

          </ion-label>

          <ion-input

            [(ngModel)]="datos.passwordNueva"

            [type]="mostrarNueva ? 'text' : 'password'">

          </ion-input>

          <ion-button

            fill="clear"

            slot="end"

            (click)="mostrarNueva = !mostrarNueva">

            <ion-icon

              [name]="mostrarNueva ? 'eye-off-outline' : 'eye-outline'">

            </ion-icon>

          </ion-button>

        </ion-item>

        <ion-item>

          <ion-label position="stacked">

            Confirmar contraseña

          </ion-label>

          <ion-input

            [(ngModel)]="datos.confirmarPassword"

            [type]="mostrarConfirmar ? 'text' : 'password'">

          </ion-input>

          <ion-button

            fill="clear"

            slot="end"

            (click)="mostrarConfirmar = !mostrarConfirmar">

            <ion-icon

              [name]="mostrarConfirmar ? 'eye-off-outline' : 'eye-outline'">

            </ion-icon>

          </ion-button>

        </ion-item>

        <ion-button

          expand="block"

          class="guardar-btn"

          (click)="guardar()">

          <ion-icon

            slot="start"

            name="save-outline">

          </ion-icon>

          Guardar cambios

        </ion-button>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
